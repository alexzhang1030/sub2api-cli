name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        run: go test ./...

      - name: Build archives
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          platforms=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
          )
          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "$platform"
            name="sub2api_${TAG}_${goos}_${goarch}"
            bin="sub2api"
            if [[ "$goos" == "windows" ]]; then
              bin="sub2api.exe"
            fi
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "dist/${name}/${bin}" .
            cp README.md "dist/${name}/README.md"
            if [[ "$goos" == "windows" ]]; then
              (cd dist && zip -qr "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi
            rm -rf "dist/${name}"
          done
          (cd dist && shasum -a 256 * > checksums.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: sub2api-cli ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
